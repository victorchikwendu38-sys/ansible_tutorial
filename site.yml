---

- hosts: all
  become: true
  pre_tasks:


  - name:  install updates (ubuntu)
    tags: always
    apt:
      upgrade: dist
      update_cache: yes
    when: ansible_distribution == "ubuntu"

  - name:  install updates  (amazon linux 2023 server)
    tags: always
    dnf:
      name:
        - httpd
        - php
      update_only: yes 
      update_cache: yes
    when: ansible_distribution == "Amazon"


- hosts: web_servers
  become: true
  tasks:



  - name:  install apache2 and php for ubuntu servers
    tags: apache, ubuntu
    apt:
      name:
        - apache
        - libapache2-mod-php
      state: latest
    when: ansible_distribution == "ubuntu"

  - name:  install httpd and php for amazon linux 2023 servers
    tags: httpd,php,amazon
    dnf:
      name:
        - httpd
        - php
      state: latest
    when: ansible_distribution == "Amazon"


- hosts: db_servers
  become: true
  tasks:


  - name:  install mariadb  for ubuntu servers
    tags: mariadb
    apt:
      name: mariadb-server
      state: latest
    when: ansible_distribution == "ubuntu"

  - name:  install mariadb for amazon linux 2023 servers
    tags: mariadb105
    dnf:
      name: mariadb105-server
      state: latest
    when: ansible_distribution == "Amazon"

  - name: copy default html file for site
    tags: apache,mariadb105
    copy:
      src: default_site.html
      dest: /var/www/html/index.html
      owner: root
      group: root
      mode: 0644
